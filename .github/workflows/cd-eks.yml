# ─────────────────────────────────────────────────────────────────────────────
# CD Workflow — Deploy to Amazon EKS
#
# Triggers:
#   - Push to main branch (after CI passes)
#   - Manual dispatch (workflow_dispatch) with optional image tag override
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID          - IAM user / OIDC role with ECR + EKS permissions
#   AWS_SECRET_ACCESS_KEY      - Corresponding secret key
#   AWS_REGION                 - e.g. us-east-1
#   ECR_REGISTRY               - e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com
#   ECR_REPOSITORY             - e.g. customer-intelligence
#   EKS_CLUSTER_NAME           - e.g. my-eks-cluster
#   ANTHROPIC_API_KEY          - Injected into K8s secret at deploy time
#
# Optional GitHub Secrets (for Slack notifications):
#   SLACK_WEBHOOK_URL          - Incoming webhook URL
#
# Jobs:
#   1. build-and-push  — Build Docker image, push to ECR
#   2. deploy          — Apply K8s manifests, rolling update, smoke test
# ─────────────────────────────────────────────────────────────────────────────
name: CD — Deploy to EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "ECR image tag to deploy (default: commit SHA)"
        required: false
        default: ""
      skip_smoke_test:
        description: "Skip post-deploy smoke test"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# Only one deployment at a time — queue subsequent runs
concurrency:
  group: cd-eks-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  K8S_NAMESPACE: customer-intelligence
  APP_NAME: customer-intelligence

jobs:

  # ─── Job 1: Build & Push to ECR ────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.set-image-uri.outputs.image-uri }}
      image-tag: ${{ steps.set-image-uri.outputs.image-tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine image tag
        id: image-tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image URI output
        id: set-image-uri
        run: |
          TAG="${{ steps.image-tag.outputs.tag }}"
          URI="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${TAG}"
          echo "image-uri=${URI}" >> "$GITHUB_OUTPUT"
          echo "image-tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Built and pushed: ${URI}"


  # ─── Job 2: Deploy to EKS ──────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: https://api.customer-intelligence.example.com

    env:
      IMAGE_URI: ${{ needs.build-and-push.outputs.image-uri }}
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region "${{ env.AWS_REGION }}" \
            --name "${{ env.EKS_CLUSTER_NAME }}"

      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes --no-headers | wc -l | xargs echo "Cluster nodes:"

      # ── Namespace + RBAC (idempotent) ─────────────────────────────────────
      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply ConfigMap
        run: kubectl apply -f k8s/configmap.yaml

      # ── Upsert Kubernetes Secret from GitHub Secrets ──────────────────────
      - name: Create / update Kubernetes secret
        run: |
          kubectl create secret generic customer-intelligence-secrets \
            --namespace="${{ env.K8S_NAMESPACE }}" \
            --from-literal=ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Inject image URI and apply Deployment ─────────────────────────────
      - name: Substitute image URI in deployment manifest
        run: |
          # envsubst replaces only $IMAGE_URI — other ${VAR} in YAML are left untouched
          envsubst '$IMAGE_URI' < k8s/deployment.yaml > /tmp/deployment-rendered.yaml
          echo "─── Rendered deployment image line ───"
          grep "image:" /tmp/deployment-rendered.yaml

      - name: Apply Deployment
        run: kubectl apply -f /tmp/deployment-rendered.yaml

      # ── Apply remaining manifests ──────────────────────────────────────────
      - name: Apply Service, HPA, Ingress
        run: |
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/ingress.yaml

      # ── Wait for rollout ───────────────────────────────────────────────────
      - name: Wait for rollout to complete
        timeout-minutes: 10
        run: |
          kubectl rollout status deployment/${{ env.APP_NAME }} \
            --namespace="${{ env.K8S_NAMESPACE }}" \
            --timeout=600s

      # ── Post-deploy verification ───────────────────────────────────────────
      - name: Show deployed pods
        if: always()
        run: |
          kubectl get pods \
            --namespace="${{ env.K8S_NAMESPACE }}" \
            --selector="app=${{ env.APP_NAME }}" \
            -o wide

      - name: Smoke test — health endpoint
        if: ${{ github.event.inputs.skip_smoke_test != 'true' }}
        timeout-minutes: 3
        run: |
          # Port-forward to a pod for the smoke test (avoids needing ALB DNS)
          POD=$(kubectl get pods \
            --namespace="${{ env.K8S_NAMESPACE }}" \
            --selector="app=${{ env.APP_NAME }}" \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}')

          echo "Smoke testing pod: ${POD}"
          kubectl port-forward pod/${POD} 8080:8000 \
            --namespace="${{ env.K8S_NAMESPACE }}" &
          PF_PID=$!

          # Wait for port-forward to be ready
          sleep 5

          # Health check
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health)
          echo "Health endpoint HTTP status: ${HTTP_STATUS}"

          # Readiness check
          READY_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/readiness)
          echo "Readiness endpoint HTTP status: ${READY_STATUS}"

          kill $PF_PID 2>/dev/null || true

          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "❌ Health check failed (HTTP ${HTTP_STATUS})"
            exit 1
          fi
          if [ "${READY_STATUS}" != "200" ]; then
            echo "❌ Readiness check failed (HTTP ${READY_STATUS})"
            exit 1
          fi
          echo "✅ Smoke test passed"

      # ── Rollback on failure ────────────────────────────────────────────────
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — initiating rollback..."
          kubectl rollout undo deployment/${{ env.APP_NAME }} \
            --namespace="${{ env.K8S_NAMESPACE }}"
          kubectl rollout status deployment/${{ env.APP_NAME }} \
            --namespace="${{ env.K8S_NAMESPACE }}" \
            --timeout=300s
          echo "Rollback complete. Previous version restored."

      # ── Deployment summary ─────────────────────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image Tag** | \`${{ env.IMAGE_TAG }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image URI** | \`${{ env.IMAGE_URI }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Cluster** | \`${{ env.EKS_CLUSTER_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Namespace** | \`${{ env.K8S_NAMESPACE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"

      # ── Optional: Slack notification ──────────────────────────────────────
      - name: Notify Slack on success
        if: success() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "${SLACK_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"✅ *Customer Intelligence Platform* deployed successfully\",
              \"attachments\": [{
                \"color\": \"good\",
                \"fields\": [
                  {\"title\": \"Image Tag\", \"value\": \"\`${{ env.IMAGE_TAG }}\`\", \"short\": true},
                  {\"title\": \"Cluster\", \"value\": \"\`${{ env.EKS_CLUSTER_NAME }}\`\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\", \"short\": true},
                  {\"title\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"short\": true}
                ]
              }]
            }"

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "${SLACK_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"❌ *Customer Intelligence Platform* deployment FAILED\",
              \"attachments\": [{
                \"color\": \"danger\",
                \"fields\": [
                  {\"title\": \"Image Tag\", \"value\": \"\`${{ env.IMAGE_TAG }}\`\", \"short\": true},
                  {\"title\": \"Run\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\", \"short\": true}
                ]
              }]
            }"
