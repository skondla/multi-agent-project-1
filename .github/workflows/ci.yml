# ─────────────────────────────────────────────────────────────────────────────
# CI Workflow — Customer Intelligence Platform
#
# Runs on every push and pull request.
# Jobs:
#   1. lint    — ruff code quality checks
#   2. test    — pytest unit tests (no API key needed)
#   3. docker  — build Docker image to validate Dockerfile (no push)
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - develop

# Cancel in-progress runs for the same ref (saves CI minutes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Job 1: Lint ───────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: |
          ruff check . \
            --ignore E501,E402,W503 \
            --exclude .venv,__pycache__,data

      - name: Run ruff formatter check
        run: ruff format --check . --exclude .venv,__pycache__,data


  # ─── Job 2: Tests ──────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        # ANTHROPIC_API_KEY is NOT needed — tests cover data layer + tools only
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --timeout=30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .pytest_cache/
          retention-days: 7


  # ─── Job 3: Docker Build Validation ────────────────────────────────────────
  docker-build:
    name: Docker Build (validate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: customer-intelligence:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image was built
        run: docker image inspect customer-intelligence:${{ github.sha }} || echo "Image not found in local daemon (expected with buildx)"
