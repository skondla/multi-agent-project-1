apiVersion: v1
kind: Service
metadata:
  name: customer-intelligence-svc
  namespace: customer-intelligence
  labels:
    app.kubernetes.io/name: customer-intelligence-platform
    app.kubernetes.io/component: service
spec:
  # ClusterIP: traffic routed via Ingress (ALB) — no direct external access
  type: ClusterIP
  selector:
    app: customer-intelligence-platform
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
