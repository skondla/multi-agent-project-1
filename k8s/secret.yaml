# ⚠️  SECRET TEMPLATE — DO NOT commit real values.
#
# Option A: Let the CD workflow create/update the secret automatically
#   (the cd-eks.yml workflow handles this using GitHub Secrets)
#
# Option B: Create manually before first deploy:
#   kubectl create secret generic customer-intelligence-secrets \
#     --namespace=customer-intelligence \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-xxxxx
#
# Option C: Use AWS Secrets Manager + External Secrets Operator:
#   https://external-secrets.io/latest/provider/aws-secrets-manager/
#
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: customer-intelligence-secrets
  namespace: customer-intelligence
  labels:
    app.kubernetes.io/name: customer-intelligence-platform
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Replace with actual value when applying manually.
  # The CD workflow populates this automatically from GitHub Secrets.
  ANTHROPIC_API_KEY: "REPLACE_WITH_ACTUAL_KEY"
