apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: customer-intelligence-hpa
  namespace: customer-intelligence
  labels:
    app.kubernetes.io/name: customer-intelligence-platform
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: customer-intelligence

  minReplicas: 2    # Always at least 2 for HA across AZs
  maxReplicas: 10   # Cap at 10 to control Claude API costs

  metrics:
    # Scale on CPU utilization (primary signal)
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60   # Scale up when avg CPU > 60%

    # Scale on memory utilization (secondary signal)
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60     # Wait 60s before scaling up again
      policies:
        - type: Pods
          value: 2                        # Add up to 2 pods at a time
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300    # Wait 5min before scaling down
      policies:
        - type: Pods
          value: 1                        # Remove 1 pod at a time
          periodSeconds: 120             # Every 2 minutes
